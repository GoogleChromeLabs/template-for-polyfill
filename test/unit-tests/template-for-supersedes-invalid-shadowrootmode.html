<!--
  This test is an override for
  https://wpt.live/html/dom/partial-updates/tentative/template-for-supersedes-invalid-shadowrootmode.html.

  It is basically the same test but only checks the results after giving the polyfill a chance to run since the actual test is a sync script run immediately after the template is inserted.
-->

<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>template for supersedes invalid shadowrootmode</title>
  <script src="/dist/declarative-partial-updates-polyfill.js"></script>
</head>

<body>
  <h1>template for supersedes invalid shadowrootmode</h1>
  <p id="output"></p>

  <div id="container">
    <section id=outer marker="d">
      <?start>Unchanged<?end>
                                                                </section>
                                                                <template shadowrootmode="invalid" for="d">
                                                                  <section id=inner>Inside</section>
                                                                </template>
  </div>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      window.testActual = document.querySelector('#container').innerHTML.trim();
      window.testExpected = '<section id="outer" marker="d">\n      <section id="inner">Inside</section></section>';
      const testResult = window.testActual === window.testExpected ? 'PASS' : 'FAIL';
      document.querySelector('#output').textContent = `Test result: ${testResult}`;
      if (testResult === 'FAIL') {
        console.error('Test failed');
        console.log('Actual: ', window.testActual);
        console.log('Expected: ', window.testExpected);
      }
    });
  </script>
</body>

</html>
