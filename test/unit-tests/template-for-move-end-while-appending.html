<!--
  This test is an override for
  https://wpt.live/html/dom/partial-updates/tentative/template-for-move-end-while-appending.html.

  It is basically a simplified version of the test that only checks the results after giving the polyfill a chance to run since it cannot process mid-script, like the parser can since the `<script>` tags are blocking.
-->

<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test - template for move end while appending</title>
  <script src="/dist/declarative-partial-updates-polyfill.js"></script>
</head>

<body>
  <h1>Test - template for move end while appending</h1>
  <p id="output"></p>

  <div id="target" marker="results">
    <?start>Loading...<?end></div>
  <div id="new-container"></div>
  </div>
  <script>
    const contents = [];
    const target = document.querySelector("#target");
    window.end_marker = target.lastChild;
    function step() {
      for (const script of target.querySelectorAll("script")) {
        script.remove();
      }
      contents.push(target.textContent);
      console.log(contents.join(", "));
    }

    step();
  </script>

  <template for="results"
    >A<script>
      step();
    </script><span id="b">b</span><script>
      step();
    </script><span id="c">c</span><script>
      step();
      document.querySelector("#b").before(end_marker);
      step();
    </script><span id="d">d</span><script>
      step();
      end_marker.remove();
      step();
    </script><span id="e">E</span><script>
      step();
      document.querySelector("#target").insertBefore(end_marker, document.querySelector("#e"));
      step();
    </script></script><span id="f">F</span><script>
      step();
      document.body.prepend(end_marker);
      step();
    </script></script><span id="g">G</span><script>
      step();
    </script></template>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      window.testActual = document.querySelector('[marker="results"]').innerHTML.trim();
      window.testExpected = 'A<span id="b">b</span><span id="c">c</span><span id="d">d</span><span id="e">E</span><span id="f">F</span><span id="g">G</span>';
      const testResult = window.testActual === window.testExpected ? 'PASS' : 'FAIL';
      document.querySelector('#output').textContent = `Test result: ${testResult}`;
      if (testResult === 'FAIL') {
        console.error('Test failed');
        console.log('Actual: ', window.testActual);
        console.log('Expected: ', window.testExpected);
      }
    });
  </script>
</body>

</html>
