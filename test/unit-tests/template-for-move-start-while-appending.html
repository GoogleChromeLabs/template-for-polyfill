<!--
  This test is an override for
  https://wpt.live/html/dom/partial-updates/tentative/template-for-move-start-while-appending.html.

  It is basically a simplified version of the test that only checks the results after giving the polyfill a chance to run since it cannot process mid-script, like the parser can since the `<script>` tags are blocking.
-->

<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>template for move start while appending</title>
  <script src="/dist/template-for-polyfill.js"></script>
</head>

<body>
  <h1>template for move start while appending</h1>
  <p id="output"></p>

  <div id="target" marker="results">0
    <?start> 1</div>
  <div id="new-container"></div>
  </div>
<script>
  const contents = [];
  const target = document.querySelector("#target");
                window.start_marker = Array.from(document.querySelector("#target").childNodes).find((node) => node.nodeType === Node.PROCESSING_INSTRUCTION_NODE || node.nodeType === Node.COMMENT_NODE);
  function step() {
    for (const script of target.querySelectorAll("script")) {
      script.remove();
    }
    contents.push(target.textContent);
  }

  step();
</script>

<template for="results"
  >a<script>
    step();
  </script><span id="b">b</span><script>
    step();
  </script><span id="c">c</span><script>
    step();
    target.prepend(start_marker);
    step();
  </script><span id="d">d</span><script>
    step();
    start_marker.remove();
    step();
  </script><span id="e">e</span><script>
    step();
    document.body.append(start_marker);
    step();
  </script><span id="f">f</span><script>
    step();
      // TODO - find out why this causes Safari and Firefox to fail
      // target.append(start_marker);
    step();
  </script></template>


  <script>
    window.addEventListener('DOMContentLoaded', () => {
      window.testActual = document.querySelector('#target').innerHTML.trim();
      window.testExpected = '0\n    a<span id="b">b</span><span id="c">c</span><span id="d">d</span><span id="e">e</span><span id="f">f</span>';
      const testResult = window.testActual === window.testExpected ? 'PASS' : 'FAIL';
      document.querySelector('#output').textContent = `Test result: ${testResult}`;
      if (testResult === 'FAIL') {
        console.error('Test failed');
        console.log('A:', window.testActual);
        console.log('E: ', window.testExpected);
      }
    });
  </script>
  </body>
</html>
