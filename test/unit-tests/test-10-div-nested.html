<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test 10 - div nested</title>
  <script src="../../dist/declarative-partial-updates-polyfill.js" defer></script>
</head>

<body>
  <h1>Test 10 - div nested</h1>
  <p id="output"></p>

  <section marker="gallery0">
    <p>
      Should leave first loading...<br>
      And a "This should remain" at the end
    </p>
    <?start name="all"> Loading...<br>
      <div><?start name="part">Loading inner...<?end></div>
      This should remain
    <?end>
  </section>
  <template for="gallery0#part">
    Actual <strong>gallery0</strong> content
  </template>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      window.testActual = document.querySelector('section[marker="gallery0"]').innerHTML;
      window.testExpected = `\n    <p>\n      Should leave first loading...<br>\n      And a "This should remain" at the end\n    </p>\n    <!--?start name="all"--> Loading...<br>\n      <div>\n    Actual <strong>gallery0</strong> content\n  </div>\n      This should remain\n    <!--?end-->\n  `;
      document.querySelector('#output').textContent = `Test result: ${window.testActual === window.testExpected ? 'PASS' : 'FAIL'}`;
    });
  </script>
</body>
</html>
