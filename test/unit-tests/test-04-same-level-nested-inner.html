<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test 4 - same level nested inner</title>
  <script src="/dist/template-for-polyfill.js" defer></script>
</head>

<body>
  <h1>Test 4 - same level nested inner</h1>
  <p id="output"></p>

  <section>
    <p>Should leave first loading...</p>
    <?start name="all"> Loading...<br>
      <?start name="part">Loading inner...<?end>
    <?end>
  </section>
  <template for="part">
    Actual <strong>gallery</strong> content
  </template>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      window.testActual = document.querySelector('section').innerHTML.trim();
      window.testExpected = `<p>Should leave first loading...</p>\n    <!--?start name="all"--> Loading...<br>\n      \n    Actual <strong>gallery</strong> content\n  \n    <!--?end-->`;
      document.querySelector('#output').textContent = `Test result: ${window.testActual === window.testExpected ? 'PASS' : 'FAIL'}`;
    });
  </script>
</body>
</html>
