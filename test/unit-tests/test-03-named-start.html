<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test 3 - named start</title>
  <script src="../../dist/declarative-partial-updates-polyfill.js" defer></script>
</head>

<body>
  <h1>Test 3 - named start</h1>
  <p id="output"></p>

  <section marker="gallery">
    <?start name="part">Loading...<?end></section>
    <template for="gallery#part">
      Actual <strong>gallery</strong> content
    </template>
    <script type="module">
      window.testActual = document.querySelector('section[marker="gallery"]').innerHTML.trim();
      window.testExpected = 'Actual <strong>gallery</strong> content';
      document.querySelector('#output').textContent = `Test result: ${window.testActual === window.testExpected ? 'PASS' : 'FAIL'}`;
    </script>
  </body>
</html>
